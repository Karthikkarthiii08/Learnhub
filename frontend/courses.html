<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Courses - LearnHub</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <script src="/static/js/theme.js"></script>
  <style>
    .cat-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .cat-tab {
      padding:0.4rem 1rem; border-radius:99px; font-size:0.82rem; font-weight:600;
      border:1.5px solid var(--border); background:#fff; color:var(--muted);
      cursor:pointer; transition:all 0.2s; font-family:'Inter',sans-serif;
    }
    .cat-tab:hover { border-color:var(--primary); color:var(--primary); }
    .cat-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .search-bar {
      width:100%; max-width:400px; padding:0.6rem 1rem;
      border:1.5px solid var(--border2); border-radius:var(--radius-sm);
      font-size:0.9rem; font-family:'Inter',sans-serif; color:var(--text);
      transition:border-color 0.2s;
    }
    .search-bar:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(79,70,229,0.1); }
  </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><span class="icon">🎓</span> LearnHub</a>
  <div class="nav-center">
    <a href="/">Home</a>
    <a href="/about.html">About</a>
    <a href="/courses.html" class="active">Courses</a>
  </div>
  <div class="nav-right" id="navRight">
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <a href="/login.html" class="btn btn-white btn-sm">Login</a>
    <a href="/signup.html" class="btn btn-primary btn-sm">Sign Up</a>
  </div>
</nav>
  <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem">
    <div>
      <h2 style="font-size:1.6rem;font-weight:800" id="pageTitle">All Courses</h2>
      <p style="color:var(--muted);font-size:0.88rem" id="pageSubtitle">Browse and enroll in available courses</p>
    </div>
    <input class="search-bar" id="searchInput" placeholder="🔍 Search courses..." oninput="filterCourses()"/>
  </div>

  <!-- Category tabs -->
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="all" onclick="selectCat('all', this)">All</button>
    <button class="cat-tab" data-cat="Python" onclick="selectCat('Python', this)">🐍 Python</button>
    <button class="cat-tab" data-cat="Web Development" onclick="selectCat('Web Development', this)">🌐 Web Dev</button>
    <button class="cat-tab" data-cat="JavaScript" onclick="selectCat('JavaScript', this)">⚡ JavaScript</button>
    <button class="cat-tab" data-cat="Data Science" onclick="selectCat('Data Science', this)">📊 Data Science</button>
    <button class="cat-tab" data-cat="DevOps" onclick="selectCat('DevOps', this)">🔧 DevOps</button>
    <button class="cat-tab" data-cat="Database" onclick="selectCat('Database', this)">🗄️ Database</button>
    <button class="cat-tab" data-cat="DSA" onclick="selectCat('DSA', this)">🧮 DSA</button>
    <button class="cat-tab" data-cat="Java" onclick="selectCat('Java', this)">☕ Java</button>
    <button class="cat-tab" data-cat="Mobile" onclick="selectCat('Mobile', this)">📱 Mobile</button>
    <button class="cat-tab" data-cat="premium" onclick="selectCat('premium', this)">⭐ Premium</button>
  </div>

  <div class="course-grid" id="courseGrid">
    <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">Loading courses...</div>
  </div>
</div>

<footer>
  <div class="footer-logo">🎓 LearnHub</div>
  <p>© 2025 LearnHub.</p>
</footer>

<script src="/static/js/api.js"></script>
<script>
  const user = getUser();
  if (user) {
    document.getElementById('navRight').innerHTML = `
      <button class="theme-btn" onclick="toggleTheme()">🌙</button>
      <div class="nav-user"><div class="nav-avatar">${user.name[0].toUpperCase()}</div></div>
      <a href="${user.role === 'admin' ? '/admin.html' : '/dashboard.html'}" class="btn btn-primary btn-sm">Dashboard</a>`;
    updateThemeBtn();
  }

  let allCourses = [];
  let activeCat = 'all';

  apiFetch('/api/courses').then(courses => {
    allCourses = courses;
    renderGrid(courses);
  });

  function selectCat(cat, btn) {
    activeCat = cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('searchInput').value = '';
    filterCourses();
  }

  function filterCourses() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allCourses;
    if (activeCat === 'premium') {
      filtered = filtered.filter(c => c.is_premium);
    } else if (activeCat !== 'all') {
      filtered = filtered.filter(c => c.category === activeCat);
    }
    if (q) {
      filtered = filtered.filter(c =>
        c.title.toLowerCase().includes(q) ||
        (c.instructor || '').toLowerCase().includes(q) ||
        (c.category || '').toLowerCase().includes(q)
      );
    }
    const label = activeCat === 'all' ? 'All Courses' : activeCat === 'premium' ? '⭐ Premium Courses' : activeCat + ' Courses';
    document.getElementById('pageTitle').textContent = label;
    document.getElementById('pageSubtitle').textContent = `${filtered.length} course${filtered.length !== 1 ? 's' : ''} found`;
    renderGrid(filtered);
  }

  function renderGrid(courses) {
    const grid = document.getElementById('courseGrid');
    if (!courses.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📚</div><p>No courses found.</p></div>';
      return;
    }
    grid.innerHTML = courses.map(c => courseCardHtml(c)).join('');
  }
</script>
</body>
</html>
