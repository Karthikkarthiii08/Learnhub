<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - LearnHub</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <script src="/static/js/theme.js"></script>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><span class="icon">🎓</span> LearnHub</a>
  <div class="nav-right">
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <a href="/signup.html" class="btn btn-primary btn-sm">Sign Up</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="sub">Please enter your credentials to login</p>
    <div id="alertBox"></div>
    <form id="loginForm">
      <div class="input-group">
        <label>✉️ Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required/>
      </div>
      <div class="input-group">
        <label>🔒 Password</label>
        <input type="password" id="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="loginBtn" style="margin-top:0.5rem;padding:0.85rem;font-size:1rem">
        ➜ Login
      </button>
    </form>
    <p style="text-align:center;margin-top:1.2rem;font-size:0.88rem;color:var(--muted)">
      Don't have an account? <a id="signupLink" href="/signup.html" style="color:var(--primary);font-weight:600">Create one here</a>
    </p>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
  if (isLoggedIn()) window.location.href = getUser().role === 'admin' ? '/admin.html' : '/dashboard.html';

  const params = new URLSearchParams(location.search);
  const redirect = params.get('redirect');
  const enrollCourse = params.get('enroll');

  // Pass enroll param to signup link too
  if (enrollCourse) {
    document.getElementById('signupLink').href = '/signup.html?enroll=' + enrollCourse;
  }

  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Logging in...'; btn.disabled = true;
    try {
      const data = await apiFetch('/api/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify({ role: data.role, name: data.name }));
      // If came from enroll flow, go back to course and auto-enroll
      if (enrollCourse) {
        window.location.href = '/course.html?id=' + enrollCourse + '&autoenroll=1';
      } else if (redirect) {
        window.location.href = redirect;
      } else {
        window.location.href = data.role === 'admin' ? '/admin.html' : '/dashboard.html';
      }
    } catch (err) {
      showAlert('alertBox', err.error || 'Invalid email or password');
      btn.innerHTML = '➜ Login'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
