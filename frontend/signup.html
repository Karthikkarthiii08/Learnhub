<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - LearnHub</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <script src="/static/js/theme.js"></script>
</head>
<body>
<nav>
  <a href="/" class="nav-logo"><span class="icon">🎓</span> LearnHub</a>
  <div class="nav-right">
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    <a href="/login.html" class="btn btn-white btn-sm">Login</a>
  </div>
</nav>
<div class="auth-page">
  <div class="auth-card" style="max-width:500px">
    <h2>Create Account</h2>
    <p class="sub">Fill in your details to get started</p>
    <div id="alertBox"></div>
    <form id="signupForm">
      <div class="input-group">
        <label>👤 Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required/>
      </div>
      <div class="input-group">
        <label>✉️ Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required/>
      </div>
      <div class="input-group">
        <label>📱 Phone Number</label>
        <input type="tel" id="phone" placeholder="10-digit phone number" pattern="[0-9]{10}" maxlength="10"/>
      </div>
      <div class="input-group">
        <label>🔒 Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters" minlength="6" required/>
      </div>
      <div class="input-group">
        <label>✅ Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="signupBtn" style="margin-top:0.5rem;padding:0.85rem;font-size:1rem">
        Create Account
      </button>
    </form>
    <p style="text-align:center;margin-top:1.2rem;font-size:0.88rem;color:var(--muted)">
      Already have an account? <a href="/login.html" style="color:var(--primary);font-weight:600">Login here</a>
    </p>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script>
  if (isLoggedIn()) window.location.href = getUser().role === 'admin' ? '/admin.html' : '/dashboard.html';

  const redirect = new URLSearchParams(location.search).get('redirect');
  const enrollCourse = new URLSearchParams(location.search).get('enroll');

  document.getElementById('signupForm').addEventListener('submit', async e => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (password !== confirm) {
      showAlert('alertBox', 'Passwords do not match');
      return;
    }
    if (password.length < 6) {
      showAlert('alertBox', 'Password must be at least 6 characters');
      return;
    }
    const btn = document.getElementById('signupBtn');
    btn.textContent = 'Creating account...'; btn.disabled = true;
    try {
      await apiFetch('/api/signup/student', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password
        })
      });
      // Auto-login after signup
      const data = await apiFetch('/api/login', {
        method: 'POST',
        body: JSON.stringify({ email: document.getElementById('email').value, password })
      });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify({ role: data.role, name: data.name }));
      // If came from enroll flow, go back and enroll
      if (enrollCourse) {
        window.location.href = '/course.html?id=' + enrollCourse + '&autoenroll=1';
      } else if (redirect) {
        window.location.href = redirect;
      } else {
        window.location.href = '/dashboard.html';
      }
    } catch (err) {
      showAlert('alertBox', err.error || 'Signup failed. Please try again.');
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
